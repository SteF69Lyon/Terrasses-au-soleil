name: Build and deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Monthly rebuild (1st day, 03:00 UTC) so osmCache (30d TTL) refreshes
    # and new establishments from OpenStreetMap appear on the SEO pages.
    - cron: '0 3 1 * *'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install SPA dependencies
        working-directory: ./app
        run: npm ci

      - name: Build (OG + Astro + SPA + merge)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_BUILD_KEY: ${{ secrets.GEMINI_BUILD_KEY }}
          # ai-router.ts falls back to GEMINI_API_KEY if GEMINI_BUILD_KEY is
          # invalid/blocked. Pass both so any working key suffices.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLIC_ADSENSE_CLIENT: ${{ secrets.PUBLIC_ADSENSE_CLIENT }}
          VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          # Astro 6 / Vite reads PUBLIC_* and VITE_* env vars through dotenv
          # (.env file) at build time. Writing a transient .env in the runner
          # is the only reliable way to pass those values to the build —
          # process.env alone has been observed to be ignored by Vite 6 when
          # an .env file is present in the same dir (regression introduced in
          # 473eb28: it fixed Astro's PUBLIC_ADSENSE_CLIENT but broke the SPA's
          # VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY by shadowing process.env
          # on the SPA side, producing a bundle that throws "Supabase env vars
          # manquantes" at runtime). The .env files exist only on the GHA
          # runner — never committed.
          cat > .env <<EOF
          PUBLIC_ADSENSE_CLIENT=${PUBLIC_ADSENSE_CLIENT}
          EOF
          mkdir -p app
          cat > app/.env <<EOF
          PUBLIC_ADSENSE_CLIENT=${PUBLIC_ADSENSE_CLIENT}
          VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
          VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
          VITE_ADMIN_EMAIL=${VITE_ADMIN_EMAIL}
          EOF
          # Sanity check that the SPA env file has the keys the bundle expects.
          # Print only key names (no values) to avoid leaking secrets in logs.
          echo "--- SPA env keys (app/.env) ---"
          grep -oE '^[A-Z_]+=' app/.env || true
          npm run build:og
          npm run build:app
          npm run build:astro
          npm run build:merge

      - name: List built dist/
        run: |
          echo "--- dist/ top-level ---"
          ls -la dist/
          echo "--- number of HTML pages ---"
          find dist/ -name '*.html' | wc -l

      - name: Normalize server-dir (ensure trailing slash)
        id: ftp
        env:
          RAW_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          DIR="$RAW_DIR"
          [[ "$DIR" != */ ]] && DIR="$DIR/"
          echo "server_dir=$DIR" >> "$GITHUB_OUTPUT"

      # Diagnostic — what's actually present on the FTP server before upload.
      # Helps confirm/refute "FTP partial-upload" hypothesis when SEO pages
      # 404 in prod despite local dist/ having them. Lists top-level + a few
      # sentinel SEO folders + the FTP-Deploy-Action sync state file size.
      # Failures inside the lftp script don't fail the job (continue-on-error).
      - name: Diagnostic — list FTP remote (transient)
        id: ftp_diag
        continue-on-error: true
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SERVER_DIR: ${{ steps.ftp.outputs.server_dir }}
        timeout-minutes: 3
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          echo "--- Remote root: ${SERVER_DIR} ---"
          # Wrap lftp in `timeout` so the step can't hang the workflow even
          # if the FTPS handshake stalls (Hostinger occasionally does this).
          # lftp's own net:timeout + max-retries also prevent internal hangs.
          # `set cmd:fail-exit no` keeps lftp from aborting on a missing dir.
          timeout 90s lftp -u "${FTP_USERNAME},${FTP_PASSWORD}" "ftps://${FTP_HOST}" <<LFTP_EOF || true
          set ssl:verify-certificate no
          set ftp:ssl-protect-data yes
          set ftp:passive-mode yes
          set net:timeout 15
          set net:max-retries 1
          set net:reconnect-interval-base 3
          set cmd:fail-exit no
          echo === Top-level of ${SERVER_DIR} ===
          cls -1 ${SERVER_DIR}
          echo === terrasses/ should contain ~52 cities ===
          cls -1 ${SERVER_DIR}terrasses/
          echo === bar-ensoleille-paris/ should contain index.html ===
          cls -1 ${SERVER_DIR}bar-ensoleille-paris/
          echo === sync state file ===
          cls -la ${SERVER_DIR}.ftp-deploy-sync-state.json
          bye
          LFTP_EOF
          echo "--- Diagnostic done ---"

      # Hostinger FTPS occasionally returns transient 550 "No such file or
      # directory" mid-upload. Retry the action up to 2 times before failing.
      - name: Deploy via FTPS to Hostinger (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ${{ steps.ftp.outputs.server_dir }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30

      - name: Deploy via FTPS to Hostinger (attempt 2)
        if: steps.deploy1.outcome == 'failure'
        id: deploy2
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ${{ steps.ftp.outputs.server_dir }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Wait before final attempt
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60

      - name: Deploy via FTPS to Hostinger (attempt 3, final)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ${{ steps.ftp.outputs.server_dir }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
